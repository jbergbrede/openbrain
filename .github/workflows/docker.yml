name: Build & Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jbergbrede
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sanitize branch name
        id: branch
        run: echo "tag=$(echo '${{ github.head_ref || github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ github.event_name == 'push' && format('jbergbrede/openbrain:latest\njbergbrede/openbrain:{0}', github.sha) || format('jbergbrede/openbrain:dev\njbergbrede/openbrain:{0}', steps.branch.outputs.tag) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
