embedding:
  provider: openai           # openai | google | ollama
  model: text-embedding-3-small

search:
  similarity_threshold: 0.7
  max_results: 10
  adaptive_weights: true
  score_spread_threshold: 0.05
  rrf_k: 60

connection_finding:
  similarity_threshold: 0.75
  max_connections: 5

slack:
  retrieval_result_limit: 5

paperless:
  base_url: "https://paperless.local.madis.tech"
